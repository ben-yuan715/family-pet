<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家庭宠物-宠爱思媛版</title>
    <style>
        :root {
            --primary: #6c5ce7; --bg: #0f0c29; --card: rgba(22, 33, 62, 0.95);
            --gold: #f1c40f; --cyan: #00cec9; --pink: #ff7675; --red: #ff4757; --text: #e9eaec;
        }
        body { 
            font-family: 'PingFang SC', sans-serif; background: radial-gradient(circle at center, #302b63, #0f0c29); 
            color: var(--text); padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0;
        }
        .container { width: 100%; max-width: 850px; }
        .pk-header { 
            background: rgba(0,0,0,0.6); padding: 15px; border-radius: 20px; text-align: center; margin-bottom: 15px; 
            border: 1px solid var(--primary); box-shadow: 0 0 15px var(--primary); font-weight: bold;
        }
        .player-card { background: var(--card); border-radius: 25px; padding: 20px; margin-bottom: 25px; border: 2px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); position: relative; }
        .avatar-zone { position: relative; width: 220px; height: 220px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; }
        .avatar { font-size: 70px; z-index: 5; transition: 0.3s; cursor: pointer; text-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .role-display { text-align: center; margin-bottom: 5px; }
        .role-name { font-size: 20px; font-weight: bold; color: var(--gold); }
        .role-title { font-size: 12px; color: var(--cyan); opacity: 0.8; }
        .medal-orbit { position: absolute; width: 100%; height: 100%; pointer-events: none; }
        .medal-dot { position: absolute; width: 24px; height: 24px; font-size: 14px; background: rgba(0,0,0,0.7); border-radius: 50%; display: flex; align-items: center; justify-content: center; filter: grayscale(100%); opacity: 0.15; transition: all 0.5s; }
        .medal-dot.unlocked { filter: grayscale(0%); opacity: 1; border: 1px solid var(--gold); box-shadow: 0 0 10px var(--gold); background: rgba(241,196,15,0.2); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        .survival-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 15px; margin: 10px 0; }
        .stat-item { text-align: center; }
        .stat-label { font-size: 11px; opacity: 0.6; display: block; margin-bottom: 4px; }
        .stat-val { font-size: 18px; font-weight: bold; color: var(--cyan); }
        .energy-val { color: #2ecc71; }
        .energy-warning { color: var(--red) !important; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .bar-container { margin: 8px 0; }
        .stat-bar { height: 10px; background: #0f3460; border-radius: 5px; overflow: hidden; margin-bottom: 5px; border: 1px solid rgba(255,255,255,0.05); }
        .fill-exp { background: linear-gradient(90deg, var(--gold), #f39c12); transition: width 0.6s; }
        .fill-energy { background: linear-gradient(90deg, #2ecc71, #27ae60); transition: width 0.6s; }
        .remedy-zone { background: rgba(255, 71, 87, 0.1); border: 1px dashed var(--red); padding: 10px; border-radius: 10px; margin-top: 10px; text-align: center; display: none; }
        .remedy-zone.active { display: block; }
        .btn-remedy { background: var(--red); color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; }
        .task-list { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin: 15px 0; }
        .task-item { display: flex; align-items: center; margin: 8px 0; font-size: 15px; }
        .task-item.locked { opacity: 0.4; color: var(--cyan); text-decoration: line-through; }
        input[type="checkbox"] { transform: scale(1.5); margin-right: 12px; cursor: pointer; }
        .btn-submit { width: 100%; padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; background: linear-gradient(90deg, #00b894, #00cec9); color: white; }
        .full-stats { width: 100%; margin-top: 20px; border-collapse: collapse; font-size: 11px; color: #888; }
        .full-stats td { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 6px; }
        .count-tag { color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="pk-header" id="pkInfo">生存竞技场 - 每日任务限次锁死中</div>
    <div id="players-wrapper"></div>
</div>

<script>
    const config = {
        p1: { name: '姐姐', tasks: [
            {id:'p1_t1', n:'按时去写作业', e:7}, {id:'p1_t2', n:'完成课外作业', e:7}, {id:'p1_t3', n:'英语打卡', e:4},
            {id:'p1_t4', n:'语文打卡', e:4}, {id:'p1_t5', n:'新概念学习15分钟', e:6}, {id:'p1_t6', n:'认真整理书包', e:4},
            {id:'p1_t7', n:'收拾桌面', e:4}, {id:'p1_t8', n:'收拾房间', e:5}, {id:'p1_t9', n:'认真刷牙洗脸', e:4}, {id:'p1_t10', n:'做事自觉', e:5}
        ], forms: ['🐱','🐈','🐯','🐆','🦁','🐅','🐉','🐲','🦄','👑'], titles: ['萌宠猫','灵动猫','猛击虎','幻影豹','丛林王','镇山虎','青龙魂','苍龙皇','圣独角','女王猫'] },
        p2: { name: '弟弟', tasks: [
            {id:'p2_t1', n:'自己穿衣服', e:5}, {id:'p2_t2', n:'运动打卡', e:6}, {id:'p2_t3', n:'阅读打卡', e:6},
            {id:'p2_t4', n:'控制零食', e:5}, {id:'p2_t5', n:'认真刷牙', e:4}, {id:'p2_t6', n:'早饭认真吃', e:5},
            {id:'p2_t7', n:'晚饭认真吃', e:5}, {id:'p2_t8', n:'洗澡自己找衣服', e:4}, {id:'p2_t9', n:'整理玩后的玩具', e:5}, {id:'p2_t10', n:'收拾家务', e:5}
        ], forms: ['🐶','🐕','🐩','🐺','🦊','🐕‍🦺','🦮','🦁','🦅','👑'], titles: ['萌萌犬','顽皮犬','优雅犬','极地狼','灵狐影','护卫犬','烈焰犬','狂狮王','神界鹰','王者犬'] }
    };
    const medalIcons = ['🔥','⚡','⭐','🏛️','☄️','🌌','🏹','🦋','✨','🦄','👑','☀️','📖','🔤','🧹','⚖️','📚','🔨','💰','💎','🏅','💪','🕊️','🖼️'];
    let players = JSON.parse(localStorage.getItem('petGameV18_1')) || {
        p1: { lvl:1, exp:0, score:0, history:{}, taskDates:{}, medals:[], wishes:0, energy:100, isRemedyActive:false },
        p2: { lvl:1, exp:0, score:0, history:{}, taskDates:{}, medals:[], wishes:0, energy:100, isRemedyActive:false }
    };
    function save() { localStorage.setItem('petGameV18_1', JSON.stringify(players)); render(); }

    function render() {
        const wrapper = document.getElementById('players-wrapper');
        const today = new Date().toLocaleDateString();
        wrapper.innerHTML = '';
        ['p1', 'p2'].forEach(pId => {
            const p = players[pId]; const conf = config[pId];
            let fIdx = Math.min(Math.floor((p.lvl - 1) / 2), conf.forms.length - 1);
            wrapper.innerHTML += `
                <div class="player-card">
                    <div class="role-display"><div class="role-name">${conf.name} (Lv.${p.lvl})</div><div class="role-title">${conf.titles[fIdx]}形态</div></div>
                    <div class="avatar-zone"><div class="avatar">${conf.forms[fIdx]}</div><div class="medal-orbit" id="${pId}-orbit"></div></div>
                    <div class="survival-board">
                        <div class="stat-item"><span class="stat-label">✨ 心愿点</span><span class="stat-val wish-val" onclick="parentAuth('${pId}','wish')">${p.wishes}</span></div>
                        <div class="stat-item"><span class="stat-label">累计积分</span><span class="stat-val" onclick="parentAuth('${pId}','score')">${p.score}</span></div>
                        <div class="stat-item"><span class="stat-label">生存能量</span><span class="stat-val energy-val ${p.energy < 30 ? 'energy-warning' : ''}">${p.energy}%</span></div>
                    </div>
                    <div class="bar-container">
                        <div class="stat-bar"><div class="fill-exp" style="width:${p.exp}%; height:100%"></div></div>
                        <div class="stat-bar"><div class="fill-energy" style="width:${p.energy}%; height:100%"></div></div>
                    </div>
                    <div class="remedy-zone ${p.isRemedyActive ? 'active' : ''}"><button class="btn-remedy" onclick="completeRemedy('${pId}')">完成补救任务 (+50点)</button></div>
                    <div class="task-list">
                        <label style="color:var(--gold); font-size:13px;"><input type="checkbox" id="${pId}-all" onclick="toggleAll('${pId}')"> <b>今日任务全选</b></label><hr style="opacity:0.1">
                        ${conf.tasks.map(t => {
                            const done = p.taskDates[t.id] === today;
                            return `<div class="task-item ${done?'locked':''}">
                                <input type="checkbox" class="${pId}-ck" data-id="${t.id}" data-exp="${t.e}" ${done?'checked disabled':''}>
                                <span>${t.n} (+${t.e}) ${done?'✓':''}</span>
                            </div>`;
                        }).join('')}
                    </div>
                    <button class="btn-submit" onclick="submit('${pId}')">结算提交 (每日仅限一次)</button>
                    <table class="full-stats">${conf.tasks.map(t => `<tr><td>${t.n}累计</td><td style="text-align:right" class="count-tag">${p.history[t.id]||0}次</td></tr>`).join('')}</table>
                    <button style="width:100%; border:none; background:transparent; color:var(--red); font-size:11px; margin-top:15px; opacity:0.5;" onclick="parentAuth('${pId}','punish')">表现不好/降级扣能锁</button>
                </div>`;
            setTimeout(() => drawMedals(pId), 10);
        });
        const p1T = players.p1.lvl * 100 + players.p1.exp; const p2T = players.p2.lvl * 100 + players.p2.exp;
        document.getElementById('pkInfo').innerHTML = p1T >= p2T ? "🌟 姐姐领先中" : "🌟 弟弟领先中";
    }

    function drawMedals(pId) {
        const orbit = document.getElementById(`${pId}-orbit`); const p = players[pId]; const r = 98; orbit.innerHTML = '';
        for (let i = 0; i < 24; i++) {
            const a = (i * 15 - 90) * (Math.PI / 180); const x = Math.cos(a) * r; const y = Math.sin(a) * r;
            const dot = document.createElement('div'); dot.className = `medal-dot ${p.medals.length > i ? 'unlocked' : ''}`;
            dot.style.left = `calc(50% + ${x}px - 12px)`; dot.style.top = `calc(50% + ${y}px - 12px)`;
            dot.innerHTML = medalIcons[i]; orbit.appendChild(dot);
        }
    }

    function toggleAll(pId) {
        const chk = document.getElementById(`${pId}-all`).checked;
        document.querySelectorAll(`.${pId}-ck:not(:disabled)`).forEach(c => c.checked = chk);
    }

    function submit(pId) {
        const today = new Date().toLocaleDateString();
        const cks = document.querySelectorAll(`.${pId}-ck:not(:disabled)`);
        let earned = 0; let doneCount = 0;
        cks.forEach(ck => {
            if(ck.checked) {
                earned += parseInt(ck.dataset.exp);
                players[pId].history[ck.dataset.id] = (players[pId].history[ck.dataset.id] || 0) + 1;
                players[pId].taskDates[ck.dataset.id] = today; // 关键锁定：记录日期 [4]
                doneCount++;
            }
        });
        if(earned === 0) return alert("请勾选尚未打卡的任务！");
        const oldM = players[pId].medals.length;
        players[pId].exp += earned; players[pId].score += earned;
        players[pId].energy = Math.min(100, players[pId].energy + (earned / 2));
        while(players[pId].exp >= 100) { players[pId].lvl++; players[pId].exp -= 100; players[pId].score += 50; alert("🎉 升级啦！形态已进化！"); }
        checkMedalLogic(pId);
        const newM = players[pId].medals.length;
        if(newM > oldM) {
            let nw = Math.floor(newM/3) - Math.floor(oldM/3);
            if(nw > 0) { players[pId].wishes += nw; alert(`✨ 获得${nw}个心愿点！`); }
        }
        document.getElementById(`${pId}-all`).checked = false;
        save();
    }

    function checkMedalLogic(pId) {
        const p = players[pId]; const add = (idx) => { if(p.medals.length <= idx) p.medals.push(medalIcons[idx]); };
        let t = Object.values(p.history).reduce((a,b)=>a+b, 0);
        if(t >= 10) add(0); if(t >= 50) add(1); if(p.lvl >= 10) add(7); if(p.score >= 1000) add(18);
        if(p.medals.length < 24 && t > (p.medals.length * 15)) p.medals.push(medalIcons[p.medals.length]);
    }

    function parentAuth(pId, type) {
        if(prompt("家长密码：") !== "123") return;
        if(type === 'score') players[pId].score = Math.max(0, players[pId].score - parseInt(prompt("扣除积分：", "100")));
        else if(type === 'wish') { if(players[pId].wishes > 0) { players[pId].wishes--; alert("已核销！"); } }
        else if(type === 'punish') {
            players[pId].energy -= parseInt(prompt("扣能：", "50"));
            if(players[pId].energy <= 0) { players[pId].lvl = Math.max(1, p.lvl-1); players[pId].exp=0; players[pId].energy=50; players[pId].isRemedyActive=true; alert("🚨 降级惩罚！补救任务开启！"); }
        }
        save();
    }

    function completeRemedy(pId) { if(confirm("确认补救任务已完成？")) { players[pId].energy=100; players[pId].exp+=50; players[pId].isRemedyActive=false; save(); } }
    render();
</script>
</body>
</html>
